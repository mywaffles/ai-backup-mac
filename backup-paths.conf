# ai-backup-mac — paths to back up
# One path per line. Lines starting with # are comments. ~ is supported.
# Directories are synced recursively. Files are copied as-is.

# Claude Code skills
~/.agents/skills

# Claude Desktop config
~/Library/Application Support/Claude/claude_desktop_config.json
~/Library/Application Support/Claude/config.json
~/Library/Application Support/Claude/window-state.json
~/Library/Application Support/Claude/git-worktrees.json

# Claude Code settings
~/.claude

# Shell config
# Note: ~/.zshrc is intentionally excluded — it contains secrets (1Password token).
# Add other shell files here if they exist on your system.

# OpenClaw config and workspace
~/.openclaw/openclaw.json
# ~/.openclaw/workspace is backed up via files/openclaw-workspace/ (see ai-backup)
~/.openclaw/agents/main/agent
~/.openclaw/identity
